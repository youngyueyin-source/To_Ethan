<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>aim training: jade edition</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Poetsen+One&family=Raleway+Dots&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="game.css" />
  <script src="game.js" defer></script>
</head>

<body>

  <audio id="game-music" loop>
      <source src="../sounds/game-music.mp3" type="audio/mpeg">
  </audio>

  <audio id="smooch-sound">
    <source src="../sounds/kiss.wav" type="audio/mpeg">
  </audio>

  <!-- HUD -->
  <header class="hud">
    <div class="hud-left">
      <h1>kiss aim trainer</h1>
      <p class="sub">headkiss = +25 • bodykiss = +10 • miss = -5</p>
    </div>

    <div class="hud-stats">
      <div class="stat">
        <span class="label">time</span>
        <span id="time" class="value">30.0</span>
      </div>

      <div class="stat">
        <span class="label">score</span>
        <span id="score" class="value">0</span>
      </div>

      <div class="stat">
        <span class="label">misses</span>
        <span id="misses" class="value">0</span>
      </div>

      <div class="stat">
        <span class="label">accuracy</span>
        <span id="accuracy" class="value">100%</span>
      </div>

      <div class="stat">
        <span class="label">combo</span>
        <span id="combo" class="value">0</span>
      </div>

      <div class="stat">
        <span class="label">best</span>
        <span id="bestCombo" class="value">0</span>
      </div>
    </div>
  </header>


  <!-- GAME AREA -->
  <main class="game-wrap">
    <section id="arena" class="arena" aria-label="Aim arena">

      <!-- Start Button -->
      <button id="startBtn" class="start-btn" type="button">
        start
      </button>

      <!-- Moving Jade Target -->
      <img
        id="target"
        class="target hidden"
        src="images/jade.png"
        alt="Jade target"
        draggable="false"
      />

      <!-- Hit Pop Text (HEADSHOT / MISS etc) -->
      <div id="pop" class="pop hidden" aria-hidden="true"></div>

      <!-- Rank Card -->
      <div id="rankCard" class="rank hidden" aria-hidden="true"></div>

    </section>
  </main>


  <!-- Reward Overlay -->
  <div id="rewardOverlay" class="overlay hidden" aria-hidden="true">
    <div class="modal" role="dialog" aria-label="Rewards">

      <button id="closeReward" class="close" type="button" aria-label="Close">
        ×
      </button>

      <h2>CONGRATULATIONS</h2>

      <div id="rewardGrid" class="reward-grid"></div>

      <!-- <div class="actions">
        <button id="playAgain" class="btn" type="button">
          play again
        </button>

        <a class="btn ghost" href="../index.html">
          go back home
        </a>
      </div> -->

    </div>
  </div>

</body>
</html>
